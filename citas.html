<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agendar cita | Ecoalfa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body class="bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-5xl p-6">
      <section class="overflow-hidden rounded-3xl bg-white shadow-sm ring-1 ring-slate-200">
        <div class="bg-white">
          <img src="./assets/ecoalfa-banner.jpg" alt="Ecoalfa servicios de consulta externa, apoyo diagnóstico y terapéutico" class="h-56 w-full object-cover object-center" />
        </div>

        <div class="p-8">
          <div class="flex flex-col justify-between gap-6 lg:flex-row lg:items-center">
            <div class="flex flex-col gap-5 sm:flex-row sm:items-center">
              <img src="./assets/ecoalfa-logo.jpg" alt="Logo Ecoalfa" class="h-28 w-28 rounded-2xl object-contain ring-1 ring-slate-200" />
              <div>
                <h1 class="text-3xl font-bold text-slate-950">Agendar cita Ecoalfa</h1>
                <p class="mt-2 text-slate-500">Regístrate como paciente y solicita tu cita. El consultorio confirmará la disponibilidad.</p>
              </div>
            </div>
            <a class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50" href="./index.html">Ingreso funcionarios</a>
          </div>

        <form id="public-appointment-form" class="mt-8 space-y-8">
          <section>
            <h2 class="text-xl font-bold">Datos personales</h2>
            <div class="mt-4 grid gap-4 md:grid-cols-2 lg:grid-cols-3">
              <div>
                <label class="mb-1 block text-sm font-medium" for="documentType">Tipo de documento</label>
                <select id="documentType" required class="w-full rounded-xl border border-slate-300 px-4 py-3"><option>CC</option><option>TI</option><option>CE</option><option>Pasaporte</option><option>PEP</option><option>NIT</option></select>
              </div>
              <label class="block text-sm font-medium">Número de documento<input id="documentNumber" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Primer nombre<input id="firstName" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Segundo nombre<input id="middleName" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Primer apellido<input id="firstLastName" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Segundo apellido<input id="secondLastName" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Correo electrónico<input id="email" type="email" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Celular<input id="phone" type="tel" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Dirección<input id="address" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Barrio<input id="neighborhood" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Municipio<input id="municipality" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <div>
                <label class="mb-1 block text-sm font-medium" for="gender">Género</label>
                <select id="gender" required class="w-full rounded-xl border border-slate-300 px-4 py-3"><option>Hombre</option><option>Mujer</option><option>Otro</option><option>Prefiero no decirlo</option></select>
              </div>
              <label id="custom-gender-wrapper" class="hidden text-sm font-medium">Escribe tu género<input id="customGender" class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
            </div>
          </section>

          <section>
            <h2 class="text-xl font-bold">Solicitud de cita</h2>
            <div class="mt-4 grid gap-4 md:grid-cols-2">
              <div>
                <label class="mb-1 block text-sm font-medium" for="doctorId">Médico asignado</label>
                <select id="doctorId" class="w-full rounded-xl border border-slate-300 px-4 py-3"><option value="">Sin preferencia</option></select>
              </div>
              <label class="block text-sm font-medium">Fecha deseada<input id="requestedDate" type="date" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium">Hora deseada<input id="requestedTime" type="time" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3" /></label>
              <label class="block text-sm font-medium md:col-span-2">Motivo de consulta<textarea id="reason" rows="4" required class="mt-1 w-full rounded-xl border border-slate-300 px-4 py-3"></textarea></label>
            </div>
          </section>

          <p id="message" class="hidden rounded-xl px-4 py-3 text-sm"></p>
          <button class="rounded-xl bg-emerald-700 px-6 py-3 font-semibold text-white hover:bg-emerald-800" type="submit">Enviar solicitud de cita</button>
        </form>
        </div>
      </section>
    </main>

    <script type="module">
      import { createPublicAppointmentRequest, getPublicDoctors } from "./src/public/public.service.js";

      const form = document.querySelector("#public-appointment-form");
      const message = document.querySelector("#message");
      const doctorSelect = document.querySelector("#doctorId");
      const gender = document.querySelector("#gender");
      const customGenderWrapper = document.querySelector("#custom-gender-wrapper");
      let doctors = [];

      gender.addEventListener("change", () => {
        customGenderWrapper.classList.toggle("hidden", gender.value !== "Otro");
      });

      async function loadDoctors() {
        try {
          doctors = await getPublicDoctors();
          doctorSelect.innerHTML = `<option value="">Sin preferencia</option>${doctors.map((doctor) => `<option value="${doctor.id}">${doctor.fullName} · ${doctor.specialty || "Medicina"}</option>`).join("")}`;
        } catch (error) {
          console.error("No fue posible cargar médicos", error);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const selectedDoctor = doctors.find((doctor) => doctor.id === form.doctorId.value);

        try {
          await createPublicAppointmentRequest({
            documentType: form.documentType.value,
            documentNumber: form.documentNumber.value,
            firstName: form.firstName.value,
            middleName: form.middleName.value,
            firstLastName: form.firstLastName.value,
            secondLastName: form.secondLastName.value,
            email: form.email.value,
            phone: form.phone.value,
            address: form.address.value,
            neighborhood: form.neighborhood.value,
            municipality: form.municipality.value,
            gender: form.gender.value,
            customGender: form.customGender.value,
            doctorId: form.doctorId.value,
            doctorName: selectedDoctor?.fullName || "Sin preferencia",
            requestedDate: form.requestedDate.value,
            requestedTime: form.requestedTime.value,
            reason: form.reason.value
          });

          form.reset();
          showMessage("Solicitud enviada correctamente. Ecoalfa confirmará tu cita.", "success");
        } catch (error) {
          console.error("No fue posible enviar la solicitud", error);
          showMessage("No fue posible enviar la solicitud. Revisa conexión o reglas de Firestore.", "error");
        }
      });

      function showMessage(text, type) {
        message.className = `rounded-xl px-4 py-3 text-sm ${type === "success" ? "bg-emerald-50 text-emerald-700" : "bg-red-50 text-red-700"}`;
        message.textContent = text;
      }

      await loadDoctors();
    </script>
  </body>
</html>
